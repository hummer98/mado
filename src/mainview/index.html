<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mado</title>
  <!-- GitHub Markdown スタイル -->
  <link rel="stylesheet" href="views://mainview/github-markdown.css">
  <!-- highlight.js テーマ（OS のカラースキームに合わせて切り替え） -->
  <link rel="stylesheet" id="hljs-theme-light" href="views://mainview/hljs-github.css">
  <link rel="stylesheet" id="hljs-theme-dark" href="views://mainview/hljs-github-dark.css" disabled>
  <style>
    /* ページ全体のベーススタイル */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--color-canvas-default, #ffffff);
      color: var(--color-fg-default, #1f2328);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* 2 カラム grid レイアウト */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100vh;
      overflow: hidden;
      transition: grid-template-columns 200ms ease-in-out;
    }

    /* サイドバー */
    #sidebar {
      border-right: 1px solid #d1d9e0;
      background: #f6f8fa;
      overflow-y: auto;
      height: 100vh;
      box-sizing: border-box;
      transform: translateX(0);
      transition: transform 200ms ease-in-out;
      transform-origin: left;
    }

    /* アコーディオン閉時: grid 列を 0 にして sidebar を画面外へ */
    #app[data-sidebar="closed"] {
      grid-template-columns: 0 1fr;
    }

    #app[data-sidebar="closed"] #sidebar {
      transform: translateX(-100%);
      overflow: hidden;
    }

    /* 視差を減らす設定: アニメーションを無効化 */
    @media (prefers-reduced-motion: reduce) {
      #app,
      #sidebar {
        transition: none;
      }
    }

    #file-list {
      list-style: none;
      margin: 0;
      padding: 4px 0;
    }

    .entry {
      display: flex;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .entry-label {
      flex: 1;
      text-align: left;
      background: transparent;
      border: none;
      padding: 6px 8px 6px 12px;
      font: inherit;
      color: inherit;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .entry-label:hover {
      background: #eaeef2;
    }

    .entry-close {
      background: transparent;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      color: #57606a;
      font-size: 14px;
      line-height: 1;
      visibility: hidden;
    }

    .entry:hover .entry-close,
    .entry.active .entry-close {
      visibility: visible;
    }

    .entry-close:hover {
      background: #eaeef2;
      color: #cf222e;
    }

    .entry.active .entry-label {
      background: #ddf4ff;
      font-weight: 600;
    }

    /* メイン領域 */
    #main {
      overflow-y: auto;
      height: 100vh;
      position: relative;
    }

    /* github-markdown-css のコンテナスタイル */
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px;
      box-sizing: border-box;
      /* T032: JS (window.__MADO_ZOOM_*) から inline style.zoom で書き換えて拡大縮小する。
         デフォルトを明示することで DevTools でも初期状態が見える。 */
      zoom: 1;
    }

    /* ダークモード対応 */
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #0d1117;
        color: #e6edf3;
      }
      #sidebar {
        background: #161b22;
        border-right-color: #30363d;
      }
      .entry-label:hover {
        background: #21262d;
      }
      .entry-close {
        color: #8b949e;
      }
      .entry-close:hover {
        background: #21262d;
        color: #f85149;
      }
      .entry.active .entry-label {
        background: #1f3a5f;
      }
    }

    /* Mermaid ダイアグラムの中央揃え */
    .mermaid {
      display: flex;
      justify-content: center;
      margin: 1em 0;
    }

    /* T033: Mermaid 個別ズームのラッパー。
       `.mermaid` の子として配置され、親の flex 中央揃えに乗る。 */
    .mermaid-zoom-wrapper {
      position: relative;
      overflow: hidden;
      /* ctrlKey wheel (pinch) のみ preventDefault する運用。
         iPad / 外部タッチパネル接続時の縦スクロールを守るため pan-y を明示する。 */
      touch-action: pan-y;
      max-width: 100%;
    }

    .mermaid-zoom-wrapper > svg {
      transform-origin: 0 0;
      /* pinch 中の focal-point ドリフトを避けるため、transition は基本 off。
         ボタン操作時のみ JS から一時的に付与する。 */
      transition: none;
      will-change: transform;
      cursor: default;
      user-select: none;
    }

    .mermaid-zoom-wrapper.is-zoomed > svg {
      cursor: grab;
    }
    .mermaid-zoom-wrapper.is-panning > svg {
      cursor: grabbing;
    }

    .mermaid-zoom-controls {
      position: absolute;
      top: 6px;
      right: 6px;
      display: none;
      gap: 4px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      padding: 2px;
      z-index: 1;
    }
    .mermaid-zoom-wrapper:hover .mermaid-zoom-controls,
    .mermaid-zoom-wrapper:focus-within .mermaid-zoom-controls {
      display: flex;
    }

    .mermaid-zoom-controls button {
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      font: inherit;
      color: inherit;
      border-radius: 4px;
      line-height: 1;
    }
    .mermaid-zoom-controls button:hover {
      background: #eaeef2;
    }
    .mermaid-zoom-controls button:focus-visible {
      outline: 2px solid #0969da;
      outline-offset: 1px;
    }

    @media (prefers-color-scheme: dark) {
      .mermaid-zoom-controls {
        background: rgba(22, 27, 34, 0.9);
        border-color: #30363d;
      }
      .mermaid-zoom-controls button:hover {
        background: #21262d;
      }
      .mermaid-zoom-controls button:focus-visible {
        outline-color: #58a6ff;
      }
    }

    /* Mermaid パースエラーのインライン表示 */
    .mermaid-error {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
      color: #856404;
      white-space: pre;
      overflow-x: auto;
      margin: 1em 0;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      .mermaid-error {
        background: #332701;
        border-color: #664d00;
        color: #ffc107;
      }
    }

    /* ローディング中インジケーター */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }

    /* 空状態 / ウェルカムプレースホルダ */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #57606a;
      padding: 32px;
      text-align: center;
      gap: 12px;
    }

    .welcome-title {
      font-size: 56px;
      font-weight: 300;
      margin: 0;
      letter-spacing: 2px;
      color: var(--color-fg-default, #1f2328);
    }

    .welcome-hint {
      font-size: 15px;
      margin: 0;
    }

    .welcome-cli code {
      background: rgba(175, 184, 193, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
    }

    @media (prefers-color-scheme: dark) {
      .welcome-title {
        color: #e6edf3;
      }
      #empty-state {
        color: #8b949e;
      }
      .welcome-cli code {
        background: rgba(110, 118, 129, 0.3);
      }
    }
  </style>
</head>
<body>
  <div id="app" data-sidebar="open">
    <aside id="sidebar" aria-label="ファイルリスト">
      <ul id="file-list"></ul>
    </aside>
    <main id="main">
      <div id="loading">読み込み中...</div>
      <div id="empty-state" class="welcome" style="display: none;">
        <h1 class="welcome-title">mado</h1>
        <p class="welcome-hint">⌘O で Markdown ファイルを開く</p>
        <p class="welcome-cli"><code>mado README.md</code></p>
      </div>
      <article class="markdown-body" id="content" style="display: none;"></article>
    </main>
  </div>
  <!-- WebView 側 JS（Bun によってバンドルされる） -->
  <script type="module" src="views://mainview/index.js"></script>
</body>
</html>
