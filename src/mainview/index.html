<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mado</title>
  <!-- GitHub Markdown スタイル -->
  <link rel="stylesheet" href="views://mainview/github-markdown.css">
  <!-- highlight.js テーマ（OS のカラースキームに合わせて切り替え） -->
  <link rel="stylesheet" id="hljs-theme-light" href="views://mainview/hljs-github.css">
  <link rel="stylesheet" id="hljs-theme-dark" href="views://mainview/hljs-github-dark.css" disabled>
  <style>
    /* ページ全体のベーススタイル */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--color-canvas-default, #ffffff);
      color: var(--color-fg-default, #1f2328);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* 2 カラム grid レイアウト */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* サイドバー */
    #sidebar {
      border-right: 1px solid #d1d9e0;
      background: #f6f8fa;
      overflow-y: auto;
      height: 100vh;
      box-sizing: border-box;
    }

    #file-list {
      list-style: none;
      margin: 0;
      padding: 4px 0;
    }

    .entry {
      display: flex;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .entry-label {
      flex: 1;
      text-align: left;
      background: transparent;
      border: none;
      padding: 6px 8px 6px 12px;
      font: inherit;
      color: inherit;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .entry-label:hover {
      background: #eaeef2;
    }

    .entry-close {
      background: transparent;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      color: #57606a;
      font-size: 14px;
      line-height: 1;
      visibility: hidden;
    }

    .entry:hover .entry-close,
    .entry.active .entry-close {
      visibility: visible;
    }

    .entry-close:hover {
      background: #eaeef2;
      color: #cf222e;
    }

    .entry.active .entry-label {
      background: #ddf4ff;
      font-weight: 600;
    }

    /* メイン領域 */
    #main {
      overflow-y: auto;
      height: 100vh;
      position: relative;
    }

    /* github-markdown-css のコンテナスタイル */
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px;
      box-sizing: border-box;
    }

    /* ダークモード対応 */
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #0d1117;
        color: #e6edf3;
      }
      #sidebar {
        background: #161b22;
        border-right-color: #30363d;
      }
      .entry-label:hover {
        background: #21262d;
      }
      .entry-close {
        color: #8b949e;
      }
      .entry-close:hover {
        background: #21262d;
        color: #f85149;
      }
      .entry.active .entry-label {
        background: #1f3a5f;
      }
    }

    /* Mermaid ダイアグラムの中央揃え */
    .mermaid {
      display: flex;
      justify-content: center;
      margin: 1em 0;
    }

    /* Mermaid パースエラーのインライン表示 */
    .mermaid-error {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
      color: #856404;
      white-space: pre;
      overflow-x: auto;
      margin: 1em 0;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      .mermaid-error {
        background: #332701;
        border-color: #664d00;
        color: #ffc107;
      }
    }

    /* ローディング中インジケーター */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }

    /* 空状態プレースホルダ */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      padding: 32px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <ul id="file-list"></ul>
    </aside>
    <main id="main">
      <div id="loading">読み込み中...</div>
      <div id="empty-state" style="display: none;">
        <p>ファイルが開かれていません。</p>
        <p><code>mado &lt;file&gt;</code> で追加してください。</p>
      </div>
      <article class="markdown-body" id="content" style="display: none;"></article>
    </main>
  </div>
  <!-- WebView 側 JS（Bun によってバンドルされる） -->
  <script type="module" src="views://mainview/index.js"></script>
</body>
</html>
